backend:
  name: git-gateway
  branch: main
local_backend: true

media_folder: "public/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Category", name: "category", widget: "string", default: "Insight"}
      - {label: "Tags", name: "tags", widget: "list", default: ["Web"]}
      - {label: "Read Time", name: "readTime", widget: "string", default: "5 min read"}
      - {label: "Excerpt", name: "excerpt", widget: "text"}
      - {label: "Body", name: "body", widget: "markdown"}
  
  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Tagline", name: "tagline", widget: "string"}
      - {label: "Description/Excerpt", name: "description", widget: "text"}
      - {label: "Problem", name: "problem", widget: "text"}
      - {label: "Approach", name: "approach", widget: "text"}
      - {label: "Tags", name: "tags", widget: "list", default: ["React", "Node.js"]}
      - {label: "Featured", name: "featured", widget: "boolean", default: false}
      - {label: "Live Demo URL", name: "demoUrl", widget: "string", required: false}
      - {label: "GitHub Repo URL", name: "githubUrl", widget: "string", required: false}
      - {label: "Body (Detailed Case Study)", name: "body", widget: "markdown", required: false}

  - name: "teaching"
    label: "Teaching & Resources"
    folder: "src/content/teaching"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Type", name: "type", widget: "select", options: ["Course", "Resource", "Guide"]}
      - {label: "Semester/Year", name: "semester", widget: "string", required: false}
      - {label: "Description/Summary", name: "description", widget: "text"}
      - {label: "Tags", name: "tags", widget: "list", default: ["CS"]}
      - {label: "External Link URL", name: "linkUrl", widget: "string", required: false}
      - {label: "Body (Syllabus or Guide)", name: "body", widget: "markdown", required: false}

  - name: "research"
    label: "Research Publications"
    folder: "src/content/research"
    create: true
    slug: "{{year}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Authors", name: "authors", widget: "string"}
      - {label: "Venue/Conference", name: "venue", widget: "string"}
      - {label: "Year", name: "year", widget: "string"}
      - {label: "Type (e.g., Conference, Journal)", name: "type", widget: "string"}
      - {label: "Status (e.g., Published, Under Review)", name: "status", widget: "string"}
      - {label: "Link URL", name: "linkUrl", widget: "string", required: false}
      - {label: "PDF URL", name: "pdfUrl", widget: "string", required: false}
      - {label: "Keywords", name: "keywords", widget: "list", default: ["CS"]}
      - {label: "Abstract", name: "excerpt", widget: "text"}
      - {label: "Full Text/Details", name: "body", widget: "markdown", required: false}
